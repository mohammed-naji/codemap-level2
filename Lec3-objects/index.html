<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="max-w-5xl mx-auto">
    <h1 class="text-2xl font-semibold">Add Students</h1>
    <form action="" class="flex gap-4 my-6 form-data">
      <input type="text" class="border border-gray-400 rounded p-2 input-name" placeholder="Name" required>
      <input type="email" class="border border-gray-400 rounded p-2 input-email" placeholder="Email" required>
      <input type="number" class="border border-gray-400 rounded p-2 input-age" placeholder="Age" required>
      <button class="bg-cyan-700 text-white p-2 px-6 rounded duration-200 hover:bg-cyan-600 cursor-pointer">Add</button>
    </form>

    <hr>


    <div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">
      <table class="w-full text-sm text-left rtl:text-right text-body">
        <thead class="text-sm text-body bg-cyan-800 text-white border-b rounded-base border-default">
          <tr>
            <th scope="col" class="px-6 py-3 font-medium">
              #
            </th>
            <th scope="col" class="px-6 py-3 font-medium">
              Name
            </th>
            <th scope="col" class="px-6 py-3 font-medium">
              Email
            </th>
            <th scope="col" class="px-6 py-3 font-medium">
              Age
            </th>
          </tr>
        </thead>
        <tbody>

        </tbody>
      </table>
    </div>

  </div>

  <div class="menu absolute w-40 p-4 bg-gray-200 rounded shadow hidden">
    Mohammed Naji
  </div>

  <script src="js/script.js"></script>
</body>

</html>
